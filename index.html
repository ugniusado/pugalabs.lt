<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Puga Labs — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline { font-size: 1.1rem; color: #94a3b8; margin-bottom: 3.5rem; letter-spacing: 1px; }
    .headline { font-size: 1.4rem; font-weight: 300; letter-spacing: 3px; text-transform: uppercase; color: #cbd5e1; margin-bottom: 2rem; }
    .countdown { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; margin-bottom: 3.5rem; }
    .countdown-block { display: flex; flex-direction: column; align-items: center; min-width: 80px; }
    .countdown-number { font-size: 4rem; font-weight: 700; line-height: 1; background: linear-gradient(180deg, #fff 0%, #a78bfa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .countdown-label { font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; color: #64748b; margin-top: 0.5rem; }
    .separator { font-size: 3.5rem; color: #334155; align-self: center; padding-bottom: 1.5rem; }
    .notify-form { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; max-width: 420px; width: 100%; }
    .notify-form input { flex: 1; min-width: 220px; padding: 0.75rem 1.25rem; border-radius: 8px; border: 1px solid #334155; background: rgba(255,255,255,0.07); color: #fff; font-size: 0.95rem; outline: none; transition: border 0.2s; }
    .notify-form input::placeholder { color: #64748b; }
    .notify-form input:focus { border-color: #a78bfa; }
    .notify-form button { padding: 0.75rem 1.5rem; border-radius: 8px; border: none; background: linear-gradient(90deg, #a78bfa, #60a5fa); color: #fff; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: opacity 0.2s; }
    .notify-form button:hover { opacity: 0.85; }
    footer { position: fixed; bottom: 1.5rem; font-size: 0.8rem; color: #334155; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="logo">Puga Labs</div>
  <p class="tagline">pugalabs.lt</p>
  <p class="headline">We are launching soon</p>
  <div class="countdown" id="countdown">
    <div class="countdown-block"><span class="countdown-number" id="days">00</span><span class="countdown-label">days</span></div>
    <span class="separator">:</span>
    <div class="countdown-block"><span class="countdown-number" id="hours">00</span><span class="countdown-label">hours</span></div>
    <span class="separator">:</span>
    <div class="countdown-block"><span class="countdown-number" id="minutes">00</span><span class="countdown-label">min</span></div>
    <span class="separator">:</span>
    <div class="countdown-block"><span class="countdown-number" id="seconds">00</span><span class="countdown-label">sec</span></div>
  </div>
  <form class="notify-form" onsubmit="return false;">
    <input type="email" placeholder="your@email.com" />
    <button type="submit">Notify me</button>
  </form>
  <footer>2026 Puga Labs</footer>
  <script>
    var launch = new Date('2026-09-01T00:00:00').getTime();
    function pad(n){return String(n).padStart(2,'0');}
    function tick(){
      var diff=Math.max(0,launch-Date.now());
      document.getElementById('days').textContent=pad(Math.floor(diff/86400000));
      document.getElementById('hours').textContent=pad(Math.floor((diff%86400000)/3600000));
      document.getElementById('minutes').textContent=pad(Math.floor((diff%3600000)/60000));
      document.getElementById('seconds').textContent=pad(Math.floor((diff%60000)/1000));
    }
    tick();setInterval(tick,1000);
  </script>
</body>
</html>
